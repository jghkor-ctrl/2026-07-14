<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로또 추첨기</title>
    <meta
      name="description"
      content="로또 6/45 자동 추첨기. 결과는 Supabase에 저장되고 Vercel 환경변수로 연결됩니다."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">LOTTO 6/45</p>
        <h1>오늘의 행운을 한 번에 뽑아보세요.</h1>
        <p class="lead">
          1부터 45까지의 숫자 중 중복 없이 6개를 뽑고, 보너스 번호까지 함께 저장합니다.
          결과는 Supabase 데이터베이스에 남습니다.
        </p>

        <div class="controls" aria-label="로또 추첨 설정">
          <button id="drawBtn" class="primary-btn" type="button">추첨하기</button>
          <button id="reloadBtn" class="secondary-btn" type="button">기록 불러오기</button>
        </div>
      </section>

      <section class="stage" aria-live="polite" aria-atomic="true">
        <div class="stage-top">
          <div>
            <p class="label">이번 회차</p>
            <h2 id="roundLabel">아직 추첨 전</h2>
          </div>
          <p id="status" class="status">버튼을 눌러 추첨을 시작하세요.</p>
        </div>

        <div class="ball-row" id="mainBalls" aria-label="당첨 번호 6개"></div>

        <div class="bonus-card">
          <span class="bonus-title">보너스</span>
          <div class="bonus-ball" id="bonusBall">?</div>
        </div>
      </section>

      <section class="history-panel">
        <div class="panel-head">
          <h3>최근 추첨 기록</h3>
          <button id="clearBtn" class="text-btn" type="button">새로고침</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </section>
    </main>

    <template id="ballTemplate">
      <div class="ball">0</div>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
